services:
  kanbi:
    build:
      # Context is the monorepo root; the Dockerfile lives in apps/web.
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: kanbi
    ports:
      - "3000:3000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
